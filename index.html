<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager App</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="shortcut icon" href="icons/logo.png" type="image/x-icon">
</head>

<body>
  <!-- home  -->
  <section class="home">

    <h1 class="header-text text-center">Task Manager</h1>
    <div class="action">
      <h3 class="completed text-center js-task-display">0/0 Completed</h3> <button
        class="btn btn-add-task-btn js-add-task-btn">+ New Task</button>
    </div>
    <!-- <div class="header-dotes ">
      <h1>&#8285; </h1>
    </div> -->
    <div class="tabs js-tabs">
      <div class="tab btn active">All</div>
      <div class="tab btn">Today</div>
      <div class="tab btn"><img src="./icons/personal.png">Personal</div>
      <div class="tab btn"><img src="./icons/school.png">School</div>
      <div class="tab btn"><img src="./icons/coding.png">Coding</div>
      <div class="tab btn"><img src="./icons/work.png">Work</div>
      <div class="tab btn"><img src="./icons/health.png">Health</div>
      <div class="tab btn"><img src="./icons/shoping.png">Shoping</div>
    </div>

    <div class="tasks js-tasks">



    </div>
  </section>

  <!-- add task -->
  <section class="add-task js-add-task-page ">
    <h1 class="js-header"></h1>
    <div class="input-area">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="title" class="title-input">
      <label for="description">Description</label>
      <textarea id="description" class="date-input" placeholder="description"></textarea>
      <label for="date">Date</label>
      <input type="date" class="date-input" id="date">
    </div>
    <div class="task-catagory">
      <label>Catagorys</label>
      <div class="catagorys js-catagorys">
        <div class="tab btn"><img src="./icons/personal.png">Personal</div>
        <div class="tab btn"><img src="./icons/school.png">School</div>
        <div class="tab btn"><img src="./icons/coding.png">Coding</div>
        <div class="tab btn"><img src="./icons/work.png">Work</div>
        <div class="tab btn"><img src="./icons/health.png">Health</div>
        <div class="tab btn"><img src="./icons/shoping.png">Shoping</div>
      </div>

    </div>
    <div class="add-task-btns">
      <button class="btn btn-cancel js-task-page-cancel-btn">Cancel</button>
      <button class="btn btn-save js-task-page-save-btn">Save</button>
    </div>
  </section>


  <script src="js/main.js"></script>
</body>

</html>
